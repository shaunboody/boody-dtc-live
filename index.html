<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Boody DTC Report</title>
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:-apple-system,BlinkMacSystemFont,'Helvetica Neue',Arial,sans-serif;background:#F0EEE8;display:flex;align-items:center;justify-content:center;min-height:100vh;padding:20px}
  .card{background:#fff;border-radius:20px;padding:40px 36px;max-width:380px;width:100%;box-shadow:0 20px 60px rgba(0,0,0,.1);text-align:center}
  .logo{font-family:Georgia,serif;font-size:28px;font-weight:800;color:#4A7C59;margin-bottom:6px}
  .sub{font-size:12px;color:#9CA3AF;margin-bottom:32px;letter-spacing:.05em;text-transform:uppercase;font-weight:600}
  input{width:100%;padding:13px 16px;border:1.5px solid #E5E7EB;border-radius:10px;font-size:15px;outline:none;text-align:center;letter-spacing:.1em;transition:border-color .2s;margin-bottom:12px}
  input:focus{border-color:#4A7C59}
  button{width:100%;padding:13px;background:#1E3A2F;color:#fff;border:none;border-radius:10px;font-size:14px;font-weight:700;cursor:pointer;letter-spacing:.02em;transition:background .2s}
  button:hover{background:#2D5244}
  .error{font-size:12px;color:#EF4444;margin-top:8px;display:none}
</style>
</head>
<body>
<div class="card">
  <div class="logo">boody.</div>
  <div class="sub">Daily DTC Report</div>
  <input type="password" id="pw" placeholder="Enter password" onkeydown="if(event.key==='Enter')check()">
  <button onclick="check()">View Report</button>
  <div class="error" id="err">Incorrect password. Try again.</div>
</div>
<script>
  if (sessionStorage.getItem('boody_auth') === '1') showReport();
  function check() {
    const pw = document.getElementById('pw').value;
    if (pw === 'Boody1234$') {
      sessionStorage.setItem('boody_auth', '1');
      showReport();
    } else {
      document.getElementById('err').style.display = 'block';
      document.getElementById('pw').value = '';
      document.getElementById('pw').focus();
    }
  }
  function showReport() {
    window.location.href = 'report.html';
  }
</script>
</body>
</html>
